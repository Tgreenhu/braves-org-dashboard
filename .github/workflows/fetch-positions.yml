name: Fetch Positions (MLB + MiLB)

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run now regardless of time (bypasses the 8am ET check, for testing)'
        type: boolean
        default: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node scripts/fetch-positions.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORCE_RUN: ${{ inputs.force }}
